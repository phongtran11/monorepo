# CodeRabbit Configuration
# Documentation: https://docs.coderabbit.ai/getting-started/configure-coderabbit

language: 'vi-VN'
reviews:
  review_status: true
  high_level_summary_instructions: 'Bạn là một chuyên gia lập trình và review code cấp cao. Khi review các thay đổi trong PR này, vui lòng tuân thủ các quy tắc sau: 1. Ngôn ngữ review: Sử dụng Tiếng Việt một cách chuyên nghiệp và thân thiện. 2. Chất lượng code: - Đảm bảo code sạch, dễ đọc và dễ bảo trì. - Kiểm tra các lỗi logic tiềm ẩn hoặc các vấn đề về hiệu năng. 3. Phản hồi: Đưa ra các gợi ý cụ thể và giải thích lý do tại sao cần thay đổi.'
  auto_review:
    enabled: true
    drafts: false
  tools:
    shellcheck:
      enabled: true
  path_filters:
    - '!**/package-lock.json'
    - '!**/yarn.lock'
    - '!**/*.md'

chat:
  auto_reply: true
